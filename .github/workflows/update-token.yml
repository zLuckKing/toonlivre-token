name: Update Toonlivre Tokens (DNS Bypass)

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force DNS Resolution
        run: |
          # SUBSTITUA O IP ABAIXO PELO IP QUE VOCÊ OBTEVE NO PING
          echo "172.67.75.172 toonlivre.net" | sudo tee -a /etc/hosts
          echo "172.67.75.172 cdn.toonlivre.net" | sudo tee -a /etc/hosts

      - name: Install dependencies
        run: |
          sudo apt-get install -y xvfb
          pip install playwright
          playwright install chromium

      - name: Bypass & Capture Secrets
        run: |
          xvfb-run --auto-servernum python3 << 'EOF'
          import asyncio, json, sys, re
          from playwright.async_api import async_playwright

          CHAPTER_URL = "https://toonlivre.net/guerreiro-da-espada-mental/40"

          async def main():
              print("🚀 Iniciando Bypass com Force DNS...")
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=False, args=['--no-sandbox'])
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                  )
                  page = await context.new_page()
                  try:
                      await page.goto(CHAPTER_URL, wait_until='domcontentloaded', timeout=90000)
                      await asyncio.sleep(10)
                      
                      cookies = await context.cookies()
                      tl = next((c['value'] for c in cookies if c['name'] == 'tl_cpass'), "")
                      
                      # Extração da Senha AES
                      js_src = await page.evaluate("() => document.querySelector('script[src*=\"assets/index-\"]')?.src")
                      aes_key = "Magnesium-Strike-Astonish3393de932" # Fallback
                      xtoon = "manual_verify"
                      
                      if js_src:
                          js_text = await (await page.request.get(js_src)).text()
                          k = re.search(r'([A-Z][a-z]+-[A-Z][a-z]+-[A-Z][a-z]+[a-f0-9]+)', js_text)
                          x = re.search(r'x-toon-verify":"([^"]+)"', js_text)
                          if k: aes_key = k.group(1)
                          if x: xtoon = x.group(1)

                      with open('token.json', 'w') as f:
                          json.dump({'tl_cpass': tl, 'aes_key': aes_key, 'x_toon_verify': xtoon}, f, indent=2)
                      print(f"✅ Sucesso! AES: {aes_key}")
                  except Exception as e:
                      print(f"❌ Erro: {e}")
                      sys.exit(1)
                  finally:
                      await browser.close()
          asyncio.run(main())
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git diff --staged --quiet || git commit -m "chore: refresh tokens"
          git push
