yml
name: Auto-Capture Secrets (Hardcore Bypass)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y xvfb
          pip install playwright
          playwright install chromium

      - name: Automatic AES Discovery (Direct IP Mode)
        run: |
          xvfb-run --auto-servernum python3 << 'EOF'
          import asyncio, json, sys, re, time
          from playwright.async_api import async_playwright

          # Usamos o IP direto para pular o DNS
          IP_SITE = "104.21.35.220"
          TARGET_URL = f"https://{IP_SITE}/guerreiro-da-espada-mental/40"

          async def main():
              print(f"🚀 Iniciando captura via IP direto: {IP_SITE}")
              async with async_playwright() as p:
                  # Ignoramos erros de certificado HTTPS (causados pelo uso do IP direto)
                  browser = await p.chromium.launch(headless=False, args=['--no-sandbox', '--ignore-certificate-errors'])
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                      extra_http_headers={'Host': 'toonlivre.net'} # CRUCIAL: Diz ao servidor quem somos
                  )
                  page = await context.new_page()

                  try:
                      print("🌐 Navegando...")
                      await page.goto(TARGET_URL, wait_until='domcontentloaded', timeout=90000)
                      await asyncio.sleep(15) 
                      
                      aes_key = None
                      
                      # Extração agressiva
                      scripts = await page.evaluate("() => Array.from(document.querySelectorAll('script')).map(s => s.src)")
                      for src in scripts:
                          if 'assets/index-' in src:
                              # Corrigimos a URL do script para usar o Host correto
                              js_url = src.replace(IP_SITE, 'toonlivre.net') if IP_SITE in src else src
                              print(f"🔎 Lendo bundle: {js_url}")
                              
                              # Pegamos o JS via request manual com o Host correto
                              js_resp = await page.request.get(js_url, headers={'Host': 'toonlivre.net'})
                              js_text = await js_resp.text()
                              
                              k = re.search(r'([A-Z][a-z]+-[A-Z][a-z]+-[A-Z][a-z]+[a-f0-9]+)', js_text)
                              if k:
                                  aes_key = k.group(1)
                                  print(f"✅ Senha encontrada: {aes_key}")
                                  break

                      # Fallback caso o IP direto seja barrado pela Cloudflare
                      if not aes_key:
                          aes_key = "Magnesium-Strike-Astonish3393de932"
                          print("⚠️ Usando senha padrão (fallback)")

                      with open("token.json", "w") as f:
                          json.dump({
                              "tl_cpass": "bypass_ip",
                              "aes_key": aes_key,
                              "updated_at": int(time.time())
                          }, f, indent=2)
                          
                  except Exception as e:
                      print(f"❌ Erro: {e}")
                      sys.exit(1)
                  finally:
                      await browser.close()
          asyncio.run(main())
          EOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git commit -m "chore: auto-update secrets $(date +'%Y-%m-%d %H:%M')"
          git push
