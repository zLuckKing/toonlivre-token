name: Update Token

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Capture token
        run: |
          python3 << 'EOF'
          import asyncio, json
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  # Alterado para headless=True para funcionar no servidor do GitHub
                  browser = await p.chromium.launch(headless=True, args=['--no-sandbox'])
                  context = await browser.new_context(user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36')
                  page = await context.new_page()

                  print("🚀 Acessando...")
                  await page.goto('https://toonlivre.net/carrasco/67', wait_until='networkidle')
                  await asyncio.sleep(5)
                  
                  cookies = await context.cookies()
                  
                  # Filtramos pelos cookies necessários
                  data = {}
                  for c in cookies:
                      if c['name'] == 'toon_v':
                          data['toonlivre-pass'] = c['value']
                      elif c['name'] == 'cf_clearance':
                          data['cf_clearance'] = c['value']
                  
                  # Só salva se encontrar o toon_v
                  if 'toonlivre-pass' in data:
                      with open("token.json", "w") as f:
                          json.dump(data, f, indent=2)
                      print(f"💾 Dados salvos com sucesso: {data}")
                  else:
                      print("⚠️ Erro: toon_v não encontrado!")
                      exit(1)
                      
                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git diff --staged --quiet || (git commit -m "update cookies (toon_v)" && git push)
          
