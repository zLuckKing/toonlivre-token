name: Update Token

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Capture token
        run: |
          python3 << 'EOF'
          import asyncio, json
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  # Adicionamos mais argumentos para tentar burlar detecção de bot
                  browser = await p.chromium.launch(headless=True, args=[
                      '--no-sandbox', 
                      '--disable-setuid-sandbox',
                      '--disable-blink-features=AutomationControlled' # Esconde que é automação
                  ])
                  
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/127.0.0.0 Safari/537.36',
                      viewport={'width': 1280, 'height': 720}
                  )
                  
                  page = await context.new_page()

                  print("🚀 Tentando acesso com bypass de bot...")
                  try:
                      # Usamos uma estratégia de esperar o tráfego de rede
                      response = await page.goto('https://toonlivre.net', wait_until='networkidle', timeout=60000)
                      print(f"Status da página: {response.status}")
                  except Exception as e:
                      print(f"❌ Erro crítico de rede: {e}")
                      # Tenta listar os erros de rede mais detalhados
                      print("Dica: Se o erro for DNS, o site está bloqueando o IP da AWS/GitHub.")
                  
                  cookies = await context.cookies()
                  data = {}
                  for c in cookies:
                      if c['name'] == 'toon_v':
                          data['toonlivre-pass'] = c['value']
                      elif c['name'] == 'cf_clearance':
                          data['cf_clearance'] = c['value']
                  
                  if 'toonlivre-pass' in data:
                      with open("token.json", "w") as f:
                          json.dump(data, f, indent=2)
                      print(f"✅ Sucesso! Token capturado.")
                  else:
                      print("⚠️ Falha: toon_v vazio.")
                      exit(1)
                      
                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git diff --staged --quiet || (git commit -m "update cookies" && git push)
          
