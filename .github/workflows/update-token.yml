name: Update Token

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y xvfb
          pip install playwright
          python -c "from importlib.metadata import version; print('Playwright version:', version('playwright'))"
          playwright install chromium

      - name: Capture tl_cpass cookie
        run: |
          xvfb-run --auto-servernum python3 << 'EOF'
          import asyncio
          import json
          import sys
          from playwright.async_api import async_playwright

          CHAPTER_URL = "https://toonlivre.net/guerreiro-da-espada-mental/40"

          async def main():
              print("🚀 Iniciando captura do cookie tl_cpass...")

              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=False,
                      args=[
                          '--no-sandbox',
                          '--disable-setuid-sandbox',
                          '--disable-dev-shm-usage',
                          '--disable-blink-features=AutomationControlled',
                          '--window-size=1280,720',
                      ]
                  )
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36',
                      viewport={'width': 1280, 'height': 720},
                      extra_http_headers={
                          'Accept-Language': 'pt-BR,pt;q=0.9,en-US;q=0.8,en;q=0.7',
                      }
                  )
                  page = await context.new_page()

                  try:
                      print("📖 Acessando capítulo...")
                      await page.goto(CHAPTER_URL, wait_until='domcontentloaded', timeout=60000)

                      # Aguarda o cookie tl_cpass ser definido (o Turnstile é resolvido automaticamente)
                      print("⏳ Aguardando cookie tl_cpass...")
                      await page.wait_for_function(
                          "() => document.cookie.includes('tl_cpass=')",
                          timeout=30000  # 30 segundos é mais que suficiente
                      )
                      print("✓ Cookie tl_cpass encontrado no document.cookie")

                  except Exception as e:
                      print(f"❌ Falha ao carregar ou obter cookie: {e}")
                      await page.screenshot(path="failure.png", full_page=True)
                      await browser.close()
                      sys.exit(1)

                  # Extrai o valor do cookie do contexto
                  cookies = await context.cookies()
                  tl_cpass = None
                  for cookie in cookies:
                      if cookie['name'] == 'tl_cpass':
                          tl_cpass = cookie['value']
                          break

                  if not tl_cpass:
                      print("❌ Cookie tl_cpass não encontrado na lista de cookies")
                      await page.screenshot(path="failure.png", full_page=True)
                      await browser.close()
                      sys.exit(1)

                  print(f"🍪 tl_cpass capturado: {tl_cpass[:30]}...")

                  await browser.close()

                  # Salva o cookie em token.json
                  with open("token.json", "w") as f:
                      json.dump({"tl_cpass": tl_cpass}, f, indent=2)
                  print("✓ token.json atualizado com o cookie tl_cpass")

          asyncio.run(main())
          EOF

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot
          path: failure.png

      - name: Commit updated token
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git diff --staged --quiet || git commit -m "chore: update tl_cpass cookie $(date +'%Y-%m-%d %H:%M')"
          git push
