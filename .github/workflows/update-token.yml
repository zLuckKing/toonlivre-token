name: Update Token

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y xvfb
          pip install playwright
          playwright install chromium

      - name: Capture token
        run: |
          xvfb-run --auto-servernum python3 << 'EOF'
          import asyncio
          import json
          import os
          from playwright.async_api import async_playwright

          CHAPTER_URL = "https://toonlivre.net/guerreiro-da-espada-mental/40"

          STANDARD_HEADERS = {
              'accept', 'accept-encoding', 'accept-language', 'connection',
              'content-type', 'host', 'origin', 'referer', 'user-agent',
              'sec-ch-ua', 'sec-ch-ua-mobile', 'sec-ch-ua-platform',
              'sec-fetch-dest', 'sec-fetch-mode', 'sec-fetch-site',
              'prefers-color-scheme', 'cache-control', 'pragma',
              'if-none-match', 'if-modified-since', 'cookie',
          }

          def is_chapter_api(url):
              return '/api/mangas/' in url and '/chapters/' in url

          def is_chapter_pass(url):
              return '/api/chapter-pass' in url

          async def main():
              print("🚀 Iniciando captura do token de capítulo...")

              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=False,
                      args=[
                          '--no-sandbox',
                          '--disable-setuid-sandbox',
                          '--disable-dev-shm-usage',
                          '--disable-blink-features=AutomationControlled',
                          '--window-size=1280,720',
                      ]
                  )
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36',
                      viewport={'width': 1280, 'height': 720},
                      extra_http_headers={
                          'Accept-Language': 'pt-BR,pt;q=0.9,en-US;q=0.8,en;q=0.7',
                      }
                  )

                  page = await context.new_page()
                  custom_headers_found = {}
                  chapter_api_ok = False
                  chapter_pass_token = None

                  async def handle_request(request):
                      if is_chapter_api(request.url):
                          print(f"📡 Request capítulo: {request.url[:80]}")
                          candidates = {
                              key: value
                              for key, value in request.headers.items()
                              if key.lower() not in STANDARD_HEADERS
                          }
                          if candidates:
                              print(f"📋 Headers customizados: {list(candidates.keys())}")
                              custom_headers_found.update(candidates)
                          else:
                              print("⚠️ Nenhum header customizado nessa request")

                      if is_chapter_pass(request.url):
                          print(f"🔑 Request chapter-pass detectada!")
                          try:
                              body = request.post_data
                              if body:
                                  data = json.loads(body)
                                  print(f"🔑 turnstileToken: {data.get('turnstileToken', '')[:50]}...")
                          except Exception as e:
                              print(f"Erro ao ler body do chapter-pass: {e}")

                  async def handle_response(response):
                      nonlocal chapter_api_ok, chapter_pass_token
                      if is_chapter_pass(response.url) and response.status == 200:
                          print(f"✓ chapter-pass respondeu 200")

                      if is_chapter_api(response.url):
                          print(f"✓ API de capítulo respondeu: {response.status}")
                          if response.status == 200:
                              try:
                                  data = await response.json()
                                  if 'pages' in data and len(data['pages']) > 0:
                                      print(f"✓ pages encontradas: {len(data['pages'])} páginas")
                                      chapter_api_ok = True
                                  else:
                                      print("❌ pages não encontradas no JSON")
                              except Exception as e:
                                  print(f"Erro ao parsear páginas: {e}")
                          else:
                              print(f"❌ API retornou {response.status}")

                  page.on('request', handle_request)
                  page.on('response', handle_response)

                  try:
                      print("🏠 Acessando home...")
                      await page.goto('https://toonlivre.net', wait_until='networkidle', timeout=30000)
                  except Exception:
                      pass

                  chapter_response = None
                  try:
                      print("📖 Acessando capítulo...")
                      async with page.expect_response(
                          lambda r: is_chapter_api(r.url) and r.status == 200,
                          timeout=60000
                      ) as response_info:
                          await page.goto(CHAPTER_URL, wait_until='domcontentloaded', timeout=60000)
                          await asyncio.sleep(15)
                      chapter_response = await response_info.value
                      print(f"✓ API respondeu: {chapter_response.status}")
                  except Exception as e:
                      print(f"⚠️ Primeira tentativa falhou: {e}")
                      try:
                          print("🔄 Recarregando...")
                          async with page.expect_response(
                              lambda r: is_chapter_api(r.url) and r.status == 200,
                              timeout=60000
                          ) as response_info:
                              await page.reload(wait_until='domcontentloaded', timeout=60000)
                              await asyncio.sleep(15)
                          chapter_response = await response_info.value
                          print(f"✓ API respondeu após reload: {chapter_response.status}")
                      except Exception as e2:
                          print(f"❌ Falhou após reload: {e2}")

                  if chapter_response and chapter_response.status == 200:
                      try:
                          data = await chapter_response.json()
                          if 'pages' in data and len(data['pages']) > 0:
                              print(f"✓ pages encontradas: {len(data['pages'])} páginas")
                              chapter_api_ok = True
                          else:
                              print("❌ pages não encontradas no JSON")
                      except Exception as e:
                          print(f"Erro ao parsear páginas: {e}")
                  elif chapter_response:
                      print(f"❌ API retornou {chapter_response.status}")

                  await browser.close()

                  if not chapter_api_ok:
                      print("❌ API de capítulo não validada — não fazendo commit")
                      return

                  print(f"\n📋 Todos os headers customizados: {custom_headers_found}")

                  if len(custom_headers_found) == 0:
                      print("❌ Nenhum header customizado — não fazendo commit")
                      return

                  if len(custom_headers_found) > 1:
                      print(f"⚠️ Mais de um header customizado: {list(custom_headers_found.keys())}")
                      print("❌ Ambíguo — não fazendo commit")
                      return

                  header_name = list(custom_headers_found.keys())[0]
                  header_value = custom_headers_found[header_name]
                  captured_token = {"header": header_name, "value": header_value}
                  print(f"✓ Header único confirmado: {header_name}: {header_value}")

                  current_token = {}
                  if os.path.exists('token.json'):
                      with open('token.json', 'r') as f:
                          try:
                              current_token = json.load(f)
                          except:
                              pass

                  if (current_token.get('header') == captured_token["header"] and
                          current_token.get('value') == captured_token["value"]):
                      print("✓ Token não mudou. Nada para atualizar.")
                      return

                  with open('token.json', 'w') as f:
                      json.dump(captured_token, f)
                  print(f"✓ Token alterado!")
                  print(f"  Anterior: {current_token}")
                  print(f"  Novo: {captured_token}")

          asyncio.run(main())
          EOF

      - name: Commit token
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git diff --staged --quiet || git commit -m "chore: update token $(date +'%Y-%m-%d %H:%M')"
          git push
