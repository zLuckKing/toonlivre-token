name: Update Token

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Capture token
        run: |
          python3 << 'EOF'
          import asyncio, json
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True, args=['--no-sandbox', '--disable-setuid-sandbox'])
                  # User-agent mais robusto para simular navegação real
                  context = await browser.new_context(user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36')
                  page = await context.new_page()

                  print("🚀 Acessando o site...")
                  # Aumentando o timeout para 60 segundos
                  try:
                      # Navega para a página principal primeiro para resolver DNS e cookies
                      await page.goto('https://toonlivre.net', wait_until='domcontentloaded', timeout=60000)
                      await asyncio.sleep(5)
                      
                      # Navega para a página específica
                      await page.goto('https://toonlivre.net/carrasco/67', wait_until='networkidle', timeout=60000)
                      await asyncio.sleep(5)
                  except Exception as e:
                      print(f"❌ Erro na navegação: {e}")
                      # Tenta capturar o que for possível mesmo com erro
                  
                  cookies = await context.cookies()
                  data = {}
                  for c in cookies:
                      if c['name'] == 'toon_v':
                          data['toonlivre-pass'] = c['value']
                      elif c['name'] == 'cf_clearance':
                          data['cf_clearance'] = c['value']
                  
                  if 'toonlivre-pass' in data:
                      with open("token.json", "w") as f:
                          json.dump(data, f, indent=2)
                      print(f"✅ Sucesso! Dados: {data}")
                  else:
                      print("⚠️ Erro: toon_v não encontrado nos cookies.")
                      # Lista os cookies encontrados para debug
                      print(f"Cookies encontrados: {[c['name'] for c in cookies]}")
                      exit(1)
                      
                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git diff --staged --quiet || (git commit -m "update cookies (toon_v)" && git push)
          
