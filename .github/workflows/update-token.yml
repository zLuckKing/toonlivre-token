name: Refresh Cookies

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y xvfb
          pip install playwright
          playwright install chromium

      - name: Capture cookies via Playwright
        run: |
          xvfb-run --auto-servernum python3 << 'EOF'
          import asyncio
          import json
          import sys
          from playwright.async_api import async_playwright

          CHAPTER_URL = "https://toonlivre.net/guerreiro-da-espada-mental/40"

          async def main():
              print("🚀 Renovando cookies...")
              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=False,
                      args=['--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage',
                            '--disable-blink-features=AutomationControlled','--window-size=1280,720']
                  )
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36',
                      viewport={'width': 1280, 'height': 720},
                      extra_http_headers={'Accept-Language': 'pt-BR,pt;q=0.9,en-US;q=0.8,en;q=0.7'}
                  )
                  page = await context.new_page()

                  try:
                      print("📖 Acessando capítulo...")
                      await page.goto(CHAPTER_URL, wait_until='domcontentloaded', timeout=60000)
                      # Aguarda até 30s pelo cookie tl_cpass
                      for i in range(30):
                          cookies = await context.cookies()
                          names = [c["name"] for c in cookies]
                          if "tl_cpass" in names:
                              break
                          await asyncio.sleep(1)
                      else:
                          print("❌ tl_cpass não apareceu.")
                          sys.exit(1)

                      # Extrai os dois cookies
                      all_cookies = await context.cookies()
                      cf = next((c["value"] for c in all_cookies if c["name"] == "cf_clearance"), "")
                      tl = next((c["value"] for c in all_cookies if c["name"] == "tl_cpass"), "")
                      if not cf or not tl:
                          print("❌ Faltam cookies.")
                          sys.exit(1)

                      with open("token.json", "w") as f:
                          json.dump({"tl_cpass": tl, "cf_clearance": cf}, f, indent=2)
                      print("✅ token.json atualizado")

                  except Exception as e:
                      print(f"❌ Erro: {e}")
                      sys.exit(1)
                  finally:
                      await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit updated token
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git diff --staged --quiet || git commit -m "chore: refresh cookies $(date +'%Y-%m-%d %H:%M')"
          git push
