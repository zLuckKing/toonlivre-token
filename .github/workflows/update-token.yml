name: Update Token

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Capture token
        run: |
          python3 << 'EOF'
          import asyncio
          import json
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=True,
                      args=[
                          '--no-sandbox',
                          '--disable-setuid-sandbox',
                          '--disable-blink-features=AutomationControlled',
                          '--disable-dev-shm-usage',
                      ]
                  )
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36',
                      viewport={'width': 1280, 'height': 720},
                      extra_http_headers={
                          'Accept-Language': 'pt-BR,pt;q=0.9,en-US;q=0.8,en;q=0.7',
                      }
                  )

                  token = {"header": None, "value": None}

                  async def handle_request(request):
                      for key, value in request.headers.items():
                          if key.lower().startswith('x-tly') or key.lower().startswith('x-toon'):
                              token["header"] = key
                              token["value"] = value

                  page = await context.new_page()
                  page.on("request", handle_request)

                  try:
                      await page.goto("https://toonlivre.net", wait_until="domcontentloaded", timeout=60000)
                      await asyncio.sleep(10)
                  except Exception as e:
                      print(f"Goto error: {e}")

                  await browser.close()

                  if token["header"]:
                      with open("token.json", "w") as f:
                          json.dump(token, f)
                      print(f"Token captured: {token}")
                  else:
                      print("Token not found, keeping existing token.json")

          asyncio.run(main())
          EOF

      - name: Commit token
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git diff --staged --quiet || git commit -m "Update token"
          git push
