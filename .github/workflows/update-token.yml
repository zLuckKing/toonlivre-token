- name: Capture X-Toon-Verify and Toonlivre-Pass
  run: |
    xvfb-run --auto-servernum python3 << 'EOF'
    import asyncio
    import json
    import sys
    from playwright.async_api import async_playwright

    CHAPTER_URL = "https://toonlivre.net/guerreiro-da-espada-mental/40"
    TARGET_HEADERS = {"x-toon-verify", "toonlivre-pass"}

    async def main():
        collected = {}  # agora dentro de main, evita confusão de escopo
        print("🚀 Capturando headers do app oficial...")
        async with async_playwright() as p:
            browser = await p.chromium.launch(
                headless=False,
                args=[
                    '--no-sandbox',
                    '--disable-setuid-sandbox',
                    '--disable-dev-shm-usage',
                    '--disable-blink-features=AutomationControlled',
                    '--window-size=1280,720',
                ]
            )
            context = await browser.new_context(
                user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36',
                viewport={'width': 1280, 'height': 720},
                extra_http_headers={
                    'Accept-Language': 'pt-BR,pt;q=0.9,en-US;q=0.8,en;q=0.7',
                }
            )
            page = await context.new_page()

            async def handle_request(request):
                nonlocal collected
                if len(collected) == len(TARGET_HEADERS):
                    return
                req_headers = request.headers
                for key in TARGET_HEADERS:
                    if key in req_headers:
                        collected[key] = req_headers[key]
                        print(f"✓ Capturado: {key} = {req_headers[key]}")
                if len(collected) == len(TARGET_HEADERS):
                    print("✅ Todos os headers capturados!")

            page.on('request', handle_request)

            try:
                print("📖 Acessando capítulo...")
                await page.goto(CHAPTER_URL, wait_until='domcontentloaded', timeout=60000)
                for i in range(30):
                    if len(collected) == len(TARGET_HEADERS):
                        break
                    await asyncio.sleep(1)
            except Exception as e:
                print(f"⚠️ Erro: {e}")
            finally:
                await page.screenshot(path="debug_screenshot.png", full_page=True)
                await browser.close()

        if not collected:
            print("❌ Nenhum header capturado.")
            sys.exit(1)

        output = {
            "X-Toon-Verify": collected.get("x-toon-verify", ""),
            "Toonlivre-Pass": collected.get("toonlivre-pass", "")
        }
        with open("headers.json", "w") as f:
            json.dump(output, f, indent=2)
        print("✓ headers.json salvo com sucesso")

    asyncio.run(main())
    EOF
