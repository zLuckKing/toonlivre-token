name: Refresh Tokens and AES Key

on:
  schedule:
    - cron: '0 * * * *'   # Roda a cada 1 hora
  workflow_dispatch:      # Permite rodar manualmente

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Capture Tokens and AES Key
        run: |
          python3 << 'EOF'
          import asyncio
          import json
          import sys
          import re
          from playwright.async_api import async_playwright

          # A Home geralmente carrega o mesmo bundle JS e define os cookies básicos
          TARGET_URL = "https://toonlivre.net/" 

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                      viewport={'width': 1280, 'height': 720}
                  )
                  page = await context.new_page()

                  print(f"🌐 Acessando {TARGET_URL}...")
                  try:
                      # Aumentamos o timeout e usamos domcontentloaded para ignorar bloqueios de recursos externos
                      await page.goto(TARGET_URL, wait_until='domcontentloaded', timeout=90000)
                      # Espera obrigatória para a Cloudflare e o JS processarem
                      await asyncio.sleep(15) 
                  except Exception as e:
                      print(f"⚠️ Aviso de carregamento: {e}")

                  # 1. Capturar Cookies
                  cookies = await context.cookies()
                  tl = next((c['value'] for c in cookies if c['name'] == 'tl_cpass'), "")
                  cf = next((c['value'] for c in cookies if c['name'] == 'cf_clearance'), "")

                  # 2. Capturar Senha AES e X-Toon-Verify no JS
                  # Procuramos o script de assets que contém a lógica de decriptação
                  script_srcs = await page.evaluate("() => Array.from(document.querySelectorAll('script[src*=\"assets/index-\"]')).map(s => s.src)")
                  
                  aes_key = ""
                  xtoon = ""
                  
                  if script_srcs:
                      print(f"🔎 Analisando JS: {script_srcs[0]}")
                      try:
                          js_resp = await page.request.get(script_srcs[0])
                          js_text = await js_resp.text()
                          
                          # Regex para capturar a senha AES (Ex: Magnesium-Strike-...)
                          key_match = re.search(r'([A-Z][a-z]+-[A-Z][a-z]+-[A-Z][a-z]+[a-f0-9]+)', js_text)
                          # Regex para o x-toon-verify
                          xtoon_match = re.search(r'x-toon-verify":"([^"]+)"', js_text)
                          
                          if key_match: 
                              aes_key = key_match.group(1)
                              print(f"✅ Senha encontrada: {aes_key}")
                          if xtoon_match: 
                              xtoon = xtoon_match.group(1)
                      except Exception as e:
                          print(f"❌ Erro ao ler arquivo JS: {e}")

                  # Se não encontrar a senha no JS (bloqueio), usamos a que descobrimos manualmente como fallback
                  if not aes_key:
                      print("⚠️ Senha não encontrada no JS atual, usando Magnesium-Strike-Astonish3393de932 como fallback.")
                      aes_key = "Magnesium-Strike-Astonish3393de932"

                  # Salva o resultado
                  token_data = {
                      'tl_cpass': tl,
                      'cf_clearance': cf,
                      'aes_key': aes_key,
                      'x_toon_verify': xtoon
                  }
                  
                  with open('token.json', 'w') as f:
                      json.dump(token_data, f, indent=2)
                  
                  print("✅ Processo concluído.")
                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git diff --staged --quiet || git commit -m "chore: refresh tokens and aes key"
          git push
