name: Update Token

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y xvfb
          pip install playwright
          playwright install chromium

      - name: Capture token
        run: |
          python3 << 'EOF'
          import asyncio, json, re
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  # Adicionamos argumentos para tentar contornar bloqueios de rede/DNS
                  browser = await p.chromium.launch(
                      headless=True, 
                      args=['--no-sandbox', '--disable-setuid-sandbox', '--ignore-certificate-errors']
                  )
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36'
                  )
                  page = await context.new_page()

                  try:
                      print("🔗 Acessando Toonlivre...")
                      await page.goto('https://toonlivre.net', wait_until='networkidle', timeout=60000)
                      
                      # Aguarda o cookie de sessão ser gerado
                      await asyncio.sleep(5) 
                      
                      cookies = await context.cookies()
                      cf = next((c['value'] for c in cookies if c['name'] == 'cf_clearance'), "")
                      tl = next((c['value'] for c in cookies if c['name'] == 'tl_cpass'), "")
                      
                      print(f"DEBUG: cf_clearance={'OK' if cf else 'VAZIO'}, tl_cpass={'OK' if tl else 'VAZIO'}")
                      
                      # Salva o resultado
                      with open('token.json', 'w') as f:
                          json.dump({'toonlivre-pass': tl, 'cf_clearance': cf, 'x-toon-verify': 'qedh6j2musffc129c30eqt', 'aes_key': ''}, f, indent=2)
                  
                  except Exception as e:
                      print(f"❌ Erro crítico: {e}")
                  
                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit token
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          # Só commita se houver mudança real
          git diff --staged --quiet || (git commit -m "update token" && git push)
          
