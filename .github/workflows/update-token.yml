name: Refresh Tokens and AES Key

on:
  schedule:
    - cron: '0 * * * *'   # Roda a cada 1 hora (evita ser bloqueado por excesso)
  workflow_dispatch:      # Permite rodar manualmente clicando no botão

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Capture Tokens and AES Key
        run: |
          python3 << 'EOF'
          import asyncio
          import json
          import sys
          import re
          from playwright.async_api import async_playwright

          CHAPTER_URL = "https://toonlivre.net/guerreiro-da-espada-mental/40"

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                  )
                  page = await context.new_page()

                  print("🌐 Acessando site...")
                  try:
                      await page.goto(CHAPTER_URL, wait_until='networkidle', timeout=60000)
                      await asyncio.sleep(5) # Espera o JS assentar
                  except Exception as e:
                      print(f"Erro: {e}")
                      sys.exit(1)

                  cookies = await context.cookies()
                  tl = next((c['value'] for c in cookies if c['name'] == 'tl_cpass'), "")
                  cf = next((c['value'] for c in cookies if c['name'] == 'cf_clearance'), "")

                  script_srcs = await page.evaluate("() => Array.from(document.querySelectorAll('script[src*=\"assets/index-\"]')).map(s => s.src)")
                  
                  aes_key = ""
                  xtoon = ""
                  
                  if script_srcs:
                      js_resp = await page.request.get(script_srcs[0])
                      js_text = await js_resp.text()
                      
                      key_match = re.search(r'([A-Z][a-z]+-[A-Z][a-z]+-[A-Z][a-z]+[a-f0-9]+)', js_text)
                      xtoon_match = re.search(r'x-toon-verify":"([^"]+)"', js_text)
                      
                      if key_match: aes_key = key_match.group(1)
                      if xtoon_match: xtoon = xtoon_match.group(1)

                  if tl and aes_key:
                      with open('token.json', 'w') as f:
                          json.dump({'tl_cpass': tl, 'cf_clearance': cf, 'aes_key': aes_key, 'x_toon_verify': xtoon}, f, indent=2)
                      print(f"✅ Sucesso! Key: {aes_key}")
                  else:
                      print("❌ Falha ao capturar dados.")
                      sys.exit(1)
                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git diff --staged --quiet || git commit -m "chore: refresh tokens"
          git push
