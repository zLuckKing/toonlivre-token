name: Update Token (Cookies + AES Secrets)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y xvfb
          pip install playwright
          playwright install chromium

      - name: Capture Data (Integrated Version)
        run: |
          xvfb-run --auto-servernum python3 << 'EOF'
          import asyncio
          import json
          import sys
          import re
          from playwright.async_api import async_playwright

          CHAPTER_URL = "https://toonlivre.net/guerreiro-da-espada-mental/40"

          async def main():
              print("🚀 Iniciando captura usando sua lógica de bypass...")
              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=False,
                      args=[
                          '--no-sandbox',
                          '--disable-setuid-sandbox',
                          '--disable-dev-shm-usage',
                          '--disable-blink-features=AutomationControlled',
                          '--window-size=1280,720',
                      ]
                  )
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36',
                      viewport={'width': 1280, 'height': 720},
                      extra_http_headers={'Accept-Language': 'pt-BR,pt;q=0.9,en-US;q=0.8'}
                  )
                  page = await context.new_page()

                  try:
                      print("📖 Acessando site...")
                      await page.goto(CHAPTER_URL, wait_until='domcontentloaded', timeout=60000)

                      print("⏳ Iniciando polling de tl_cpass e extração de AES...")
                      for i in range(60): # 60 tentativas como no seu original
                          cookies = await context.cookies()
                          cookie_names = [c["name"] for c in cookies]

                          if "tl_cpass" in cookie_names:
                              print("✅ tl_cpass encontrado!")
                              tl = next(c["value"] for c in cookies if c["name"] == "tl_cpass")
                              cf = next((c["value"] for c in cookies if c["name"] == "cf_clearance"), "")
                              
                              # --- CAPTURA DA SENHA AES DENTRO DO SEU SUCESSO ---
                              aes_key = "Magnesium-Strike-Astonish3393de932"
                              xtoon = "manual_verify"
                              
                              try:
                                  script_srcs = await page.evaluate("() => Array.from(document.querySelectorAll('script[src*=\"assets/index-\"]')).map(s => s.src)")
                                  if script_srcs:
                                      js_text = await (await page.request.get(script_srcs[0])).text()
                                      k = re.search(r'([A-Z][a-z]+-[A-Z][a-z]+-[A-Z][a-z]+[a-f0-9]+)', js_text)
                                      x = re.search(r'x-toon-verify":"([^"]+)"', js_text)
                                      if k: aes_key = k.group(1)
                                      if x: xtoon = x.group(1)
                              except: pass

                              token_data = {
                                  "tl_cpass": tl,
                                  "cf_clearance": cf,
                                  "aes_key": aes_key,
                                  "x_toon_verify": xtoon
                              }
                              
                              with open("token.json", "w") as f:
                                  json.dump(token_data, f, indent=2)
                              print(f"✓ token.json salvo com AES: {aes_key}")
                              await browser.close()
                              return

                          await asyncio.sleep(2)
                          if i % 5 == 0: await page.reload(wait_until='domcontentloaded')

                  except Exception as e:
                      print(f"⚠️ Erro: {e}")
                  finally:
                      await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit updated cookies
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git diff --staged --quiet || git commit -m "chore: update tokens and aes $(date +'%Y-%m-%d %H:%M')"
          git push
