name: Auto-Capture Secrets (DNS Bypass)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force DNS Mapping
        run: |
          # Usando o IP capturado no ping: 104.21.35.220
          echo "104.21.35.220 toonlivre.net" | sudo tee -a /etc/hosts
          echo "104.21.35.220 cdn.toonlivre.net" | sudo tee -a /etc/hosts
          echo "✅ DNS mapeado para o IP 104.21.35.220"

      - name: Install dependencies
        run: |
          sudo apt-get install -y xvfb
          pip install playwright
          playwright install chromium

      - name: Automatic AES & Cookie Discovery
        run: |
          xvfb-run --auto-servernum python3 << 'EOF'
          import asyncio, json, sys, re, time
          from playwright.async_api import async_playwright

          # Usamos uma URL de capítulo real para forçar o carregamento do bundle JS
          TARGET_URL = "https://toonlivre.net/guerreiro-da-espada-mental/40"

          async def main():
              print("🔍 Iniciando captura com DNS forçado e Polling Agressivo...")
              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=False,
                      args=['--no-sandbox', '--disable-blink-features=AutomationControlled']
                  )
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                  )
                  page = await context.new_page()

                  try:
                      print(f"🌐 Acessando {TARGET_URL}...")
                      # Timeout alto e domcontentloaded para ignorar falhas DNS de trackers de anúncios
                      await page.goto(TARGET_URL, wait_until='domcontentloaded', timeout=90000)
                      
                      aes_key, xtoon, tl_cpass = None, None, None

                      # Loop de 60 segundos para garantir que o script carregue
                      for i in range(30):
                          cookies = await context.cookies()
                          tl_cpass = next((c['value'] for c in cookies if c['name'] == 'tl_cpass'), None)

                          # Captura a URL do JS bundle (assets/index-XXXX.js)
                          script_srcs = await page.evaluate("() => Array.from(document.querySelectorAll('script[src*=\"assets/index-\"]')).map(s => s.src)")
                          
                          if script_srcs:
                              js_url = script_srcs[0]
                              print(f"📂 Lendo bundle JS: {js_url}")
                              js_text = await (await page.request.get(js_url)).text()
                              
                              # REGEX para capturar a senha AES dinâmica (Ex: Palavra-Palavra-Palavra...)
                              key_match = re.search(r'([A-Z][a-z]+-[A-Z][a-z]+-[A-Z][a-z]+[a-f0-9]+)', js_text)
                              xtoon_match = re.search(r'x-toon-verify":"([^"]+)"', js_text)
                              
                              if key_match: 
                                  aes_key = key_match.group(1)
                                  print(f"✨ Senha encontrada: {aes_key}")
                              if xtoon_match: 
                                  xtoon = xtoon_match.group(1)

                          # Se temos a senha, podemos terminar, o cookie é secundário (fallback manual na extensão)
                          if aes_key:
                              break
                          
                          await asyncio.sleep(3)
                          if i % 5 == 0:
                              await page.mouse.wheel(0, 500) # Simula movimento

                      if aes_key:
                          token_data = {
                              "tl_cpass": tl_cpass or "cookie_fail",
                              "aes_key": aes_key,
                              "x_toon_verify": xtoon or "verify_fail",
                              "updated_at": int(time.time())
                          }
                          with open("token.json", "w") as f:
                              json.dump(token_data, f, indent=2)
                          print(f"✅ Sucesso total! AES Key guardada no token.json")
                      else:
                          print("❌ Não foi possível minerar a senha AES.")
                          sys.exit(1)

                  except Exception as e:
                      print(f"❌ Erro durante a navegação: {e}")
                      sys.exit(1)
                  finally:
                      await browser.close()
          asyncio.run(main())
          EOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git commit -m "chore: auto-update secrets $(date +'%Y-%m-%d %H:%M')"
          git push
