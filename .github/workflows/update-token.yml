name: Update Token

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y xvfb
          pip install playwright
          python -c "from importlib.metadata import version; print('Playwright version:', version('playwright'))"
          playwright install chromium

      - name: Capture chapter-pass details
        run: |
          xvfb-run --auto-servernum python3 << 'EOF'
          import asyncio
          import json
          import sys
          from playwright.async_api import async_playwright

          CHAPTER_URL = "https://toonlivre.net/guerreiro-da-espada-mental/40"
          collected_info = {
              "requests": [],
              "responses": []
          }

          def is_chapter_api(url):
              return '/api/mangas/' in url and '/chapters/' in url

          async def main():
              print("🚀 Iniciando captura das interações com /api/chapter-pass...")
              chapter_ok = False

              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=False,
                      args=[
                          '--no-sandbox',
                          '--disable-setuid-sandbox',
                          '--disable-dev-shm-usage',
                          '--disable-blink-features=AutomationControlled',
                          '--window-size=1280,720',
                      ]
                  )
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36',
                      viewport={'width': 1280, 'height': 720},
                      extra_http_headers={
                          'Accept-Language': 'pt-BR,pt;q=0.9,en-US;q=0.8,en;q=0.7',
                      }
                  )
                  page = await context.new_page()

                  async def handle_request(request):
                      if "/api/chapter-pass" in request.url:
                          print("\n=== REQUEST chapter-pass ===")
                          print("URL:", request.url)
                          print("Headers:", dict(request.headers))
                          body = request.post_data
                          print("Body:", body)
                          collected_info["requests"].append({
                              "url": request.url,
                              "headers": dict(request.headers),
                              "body": body
                          })

                  async def handle_response(response):
                      nonlocal chapter_ok
                      if is_chapter_api(response.url):
                          print(f"✓ API de capítulo respondeu: {response.status}")
                          if response.status == 200:
                              try:
                                  data = await response.json()
                                  if 'pages' in data and len(data['pages']) > 0:
                                      print(f"✓ pages encontradas: {len(data['pages'])} páginas")
                                      chapter_ok = True
                                  else:
                                      print("❌ pages não encontradas no JSON")
                              except Exception as e:
                                  print(f"Erro ao parsear páginas: {e}")
                          else:
                              print(f"❌ API retornou {response.status}")

                      if "/api/chapter-pass" in response.url:
                          print("\n=== RESPONSE chapter-pass ===")
                          print("Status:", response.status)
                          print("Headers:", dict(response.headers))
                          try:
                              body_text = await response.text()
                              print("Body:", body_text)
                          except Exception as e:
                              body_text = f"Erro ao ler body: {e}"
                              print(body_text)
                          collected_info["responses"].append({
                              "status": response.status,
                              "headers": dict(response.headers),
                              "body": body_text
                          })

                  page.on('request', handle_request)
                  page.on('response', handle_response)

                  # Tenta acessar o capítulo com espera explícita pela API
                  try:
                      print("📖 Acessando capítulo...")
                      async with page.expect_response(
                          lambda r: is_chapter_api(r.url) and r.status == 200,
                          timeout=60000
                      ) as response_info:
                          await page.goto(CHAPTER_URL, wait_until='domcontentloaded', timeout=60000)
                      response = await response_info.value
                      print(f"✓ API respondeu {response.status}")
                      await asyncio.sleep(2)  # estabilização
                  except Exception as e:
                      print(f"⚠️ Primeira tentativa falhou: {e}")
                      try:
                          print("🔄 Recarregando...")
                          async with page.expect_response(
                              lambda r: is_chapter_api(r.url) and r.status == 200,
                              timeout=60000
                          ) as response_info:
                              await page.reload(wait_until='domcontentloaded', timeout=60000)
                          response = await response_info.value
                          print(f"✓ API respondeu {response.status} após reload")
                          await asyncio.sleep(2)
                      except Exception as e2:
                          print(f"❌ Falhou após reload: {e2}")

                  # Se a API não confirmou pages, captura screenshot e falha
                  if not chapter_ok:
                      print("❌ API não retornou pages válidas. Capturando screenshot...")
                      await page.screenshot(path="failure.png", full_page=True)
                      await browser.close()
                      print("Screenshot salvo como failure.png")
                      sys.exit(1)

                  await browser.close()

                  # Salva todas as informações coletadas
                  with open("chapter_pass_info.json", "w") as f:
                      json.dump(collected_info, f, indent=2)
                  print("\n✓ Interações com chapter-pass salvas em chapter_pass_info.json")

          asyncio.run(main())
          EOF

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot
          path: failure.png

      - name: Upload chapter-pass info (optional)
        uses: actions/upload-artifact@v4
        with:
          name: chapter-pass-info
          path: chapter_pass_info.json

      - name: Commit chapter-pass info
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add chapter_pass_info.json
          git diff --staged --quiet || git commit -m "chore: update chapter-pass info $(date +'%Y-%m-%d %H:%M')"
          git push
