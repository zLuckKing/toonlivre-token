name: Auto-Capture Toonlivre Secrets

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y xvfb
          pip install playwright
          playwright install chromium

      - name: Automatic AES & Cookie Discovery
        run: |
          xvfb-run --auto-servernum python3 << 'EOF'
          import asyncio
          import json
          import sys
          import re
          import time
          from playwright.async_api import async_playwright

          # URL onde a lógica de descriptografia é carregada
          TARGET_URL = "https://toonlivre.net/guerreiro-da-espada-mental/40"

          async def main():
              print("🔍 Iniciando busca automática de Segredos AES...")
              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=False,
                      args=['--no-sandbox', '--disable-blink-features=AutomationControlled']
                  )
                  context = await browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                  )
                  page = await context.new_page()

                  try:
                      print(f"🌐 Acessando {TARGET_URL}...")
                      # O domcontentloaded é suficiente para carregar as tags de script
                      await page.goto(TARGET_URL, wait_until='domcontentloaded', timeout=60000)
                      
                      aes_key = None
                      xtoon = None
                      tl_cpass = None

                      # Loop de polling para garantir que o JS e os Cookies carreguem
                      for i in range(45):
                          # 1. Tentar capturar o cookie
                          cookies = await context.cookies()
                          tl_cpass = next((c['value'] for c in cookies if c['name'] == 'tl_cpass'), None)

                          # 2. Identificar e analisar o arquivo JS de assets
                          # O site usa Vite, então o arquivo começa com 'assets/index-'
                          script_srcs = await page.evaluate("() => Array.from(document.querySelectorAll('script[src*=\"assets/index-\"]')).map(s => s.src)")
                          
                          if script_srcs:
                              js_url = script_srcs[0]
                              print(f"📂 Analisando arquivo JS: {js_url}")
                              
                              # Baixa o conteúdo do JS para procurar a senha
                              js_resp = await page.request.get(js_url)
                              js_text = await js_resp.text()
                              
                              # REGEX: Procura o padrão de 3 palavras separadas por hífen seguidas de caracteres hex
                              # Exemplo: Magnesium-Strike-Astonish3393de932
                              key_match = re.search(r'([A-Z][a-z]+-[A-Z][a-z]+-[A-Z][a-z]+[a-f0-9]+)', js_text)
                              xtoon_match = re.search(r'x-toon-verify":"([^"]+)"', js_text)
                              
                              if key_match:
                                  aes_key = key_match.group(1)
                                  print(f"✨ Senha AES capturada: {aes_key}")
                              
                              if xtoon_match:
                                  xtoon = xtoon_match.group(1)

                          # Se pegou a senha e o cookie, pode parar
                          if aes_key and tl_cpass:
                              break
                              
                          await asyncio.sleep(2)

                      if aes_key:
                          token_data = {
                              "tl_cpass": tl_cpass if tl_cpass else "cookie_not_found",
                              "aes_key": aes_key,
                              "x_toon_verify": xtoon if xtoon else "verify_not_found",
                              "last_discovery": int(time.time()) # Força mudança no Git
                          }
                          
                          with open("token.json", "w") as f:
                              json.dump(token_data, f, indent=2)
                          print("✅ Dados salvos com sucesso no token.json")
                      else:
                          print("❌ Não foi possível encontrar a senha AES no código-fonte.")
                          sys.exit(1)

                  except Exception as e:
                      print(f"❌ Erro na automação: {e}")
                      sys.exit(1)
                  finally:
                      await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit and Push to Repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add token.json
          git commit -m "chore: auto-update secrets $(date +'%Y-%m-%d %H:%M')"
          git push
